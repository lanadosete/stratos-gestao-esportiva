services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: stratos_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        environment:
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE:-stratos}
            DB_USERNAME: ${DB_USERNAME:-stratos}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
        depends_on:
            db:
                condition: service_healthy
        networks:
            - stratos

    webserver:
        image: nginx:stable-alpine
        container_name: stratos_webserver
        restart: unless-stopped
        ports:
            - "${APP_PORT:-8000}:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - stratos

    db:
        image: mysql:8.0
        container_name: stratos_db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-stratos}
            MYSQL_USER: ${DB_USERNAME:-stratos}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
        ports:
            - "${DB_FORWARD_PORT:-3307}:3306"
        volumes:
            - stratos_db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - stratos

    node:
        image: node:22-alpine
        container_name: stratos_node
        working_dir: /var/www/html
        command: sh -c "npm install && npm run dev -- --host"
        ports:
            - "${VITE_PORT:-5173}:5173"
        volumes:
            - .:/var/www/html
        networks:
            - stratos

networks:
    stratos:
        driver: bridge

volumes:
    stratos_db_data:
